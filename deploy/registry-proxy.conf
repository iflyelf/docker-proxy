# registry-proxy.conf
# Docker 镜像代理 nginx 反向代理配置
# 每个上游 registry 对应一个独立后端端口（由 docker-proxy 监听）
#
# 端口映射：
#   docker.io        -> 127.0.0.1:5000  (docker-cf / docker.xiaonuo.live)
#   quay.io          -> 127.0.0.1:5001  (quay-cf)
#   gcr.io           -> 127.0.0.1:5002  (gcr-cf)
#   k8s.gcr.io       -> 127.0.0.1:5003  (k8s-gcr-cf)
#   registry.k8s.io  -> 127.0.0.1:5004  (k8s-cf)
#   ghcr.io          -> 127.0.0.1:5005  (ghcr-cf)
#   nvcr.io          -> 127.0.0.1:5008  (nvcr-cf)
#
# 注意：docker-proxy 已统一处理 token 鉴权、library/ 补全、CDN 重定向，
# nginx 只需透传请求，务必关闭 proxy_buffering 以支持大 blob 流式传输。

# 公共代理参数（每个 location 内 include）
# 如需复用可保存为单独文件再 include，这里直接内联。

## docker hub
server {
    listen 80;
    listen [::]:80;
    charset utf-8;
    server_name docker-cf.iflyelf.com;
    include /ssl/iflyelf.com/iflyelf.com.conf;
    autoindex off;
    access_log logs/docker.log combined;
    error_log logs/docker.log error;

    # 取消 body 大小限制（镜像层可能很大）
    client_max_body_size 0;

    location ^~ / {
        proxy_pass http://127.0.0.1:5000;
        proxy_cache off;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_redirect off;
        proxy_connect_timeout 300s;
        proxy_send_timeout 7200s;
        proxy_read_timeout 7200s;
        send_timeout 300s;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Nginx-Proxy true;
        access_log logs/docker.log combined;
        error_log logs/docker.log notice;
    }

    location = /robots.txt { allow all; log_not_found off; access_log off; }
    location ~ /\. { deny all; access_log off; log_not_found off; }
}

