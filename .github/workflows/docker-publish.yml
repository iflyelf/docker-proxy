name: 构建并发布 Docker 镜像

# 触发条件
on:
  # Push Dockerfile 或源码时触发
  push:
    paths:
      - 'Dockerfile'
      - '*.go'
      - 'go.mod'
      - '.github/workflows/*.yml'
  # 手动触发
  workflow_dispatch:
    inputs:
      build:
        description: '手动构建 docker-proxy 镜像'
        required: true
        default: 'build docker-proxy'
  # 点 Star 触发
  watch:
    types: [started]

# 任务
jobs:
  build:
    runs-on: ubuntu-latest
    # 仅仓库所有者可触发
    if: github.event.repository.owner.id == github.event.sender.id

    strategy:
      fail-fast: false
      matrix:
        include:
          - DOCKER_TAG: latest

    permissions:
      actions: write
      contents: read

    steps:
    # 检出代码
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 安装 QEMU（支持多架构模拟）
    - name: 安装 QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: all

    # 安装 Docker Buildx
    - name: 安装 Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        version: latest

    # 登录 Docker Hub
    - name: 登录 Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 构建并推送多架构镜像
    - name: 构建并推送镜像 (linux/amd64, linux/arm64)
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/docker-proxy:${{ matrix.DOCKER_TAG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # 清理旧的 workflow runs（保留 1 天）
    - name: 清理旧的 workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        repository: ${{ github.repository }}
        retain_days: 1
        keep_minimum_runs: 0
